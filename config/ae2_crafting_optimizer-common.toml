
[general]
	#Master switch for all AE2 Crafting Optimizer mixin behavior.
	enableOptimizer = true

[craftingCalculation]
	#Disabled by default. The preliminary missing preview mixins are not applied in the conservative build because they can interfere with AE2's Craft Confirm calculation screen.
	twoStageMissingPreview = false
	#Disabled by default. Kept only for config compatibility with older builds.
	cancelCalculationAfterPreliminaryMissingPreview = false
	#Legacy safety switch. Immediate no-calculation cache replies are disabled by default because they can arrive before the client Craft Confirm screen is ready.
	skipCalculationOnCachedMissingPreview = false
	#Disabled by default with the conservative no-Craft-Confirm-mixin build.
	useMissingPreviewCache = false
	#Maximum number of preliminary missing craft entries kept in memory.
	#Range: 0 ~ 65536
	missingPreviewCacheSize = 2048
	#Time before preliminary missing craft cache entries expire.
	#Range: 1 ~ 86400
	missingPreviewCacheTtlSeconds = 300
	#Clear preliminary missing preview cache when AE2 invalidates its storage cache.
	invalidateCacheOnStorageChange = true
	#Clear preliminary missing preview cache when AE2 crafting providers or pattern hosts change.
	invalidateCacheOnPatternChange = true
	#Only send preliminary missing previews after a calculation has been open for this many milliseconds. 0 sends as soon as the first missing branch is known.
	#Range: 0 ~ 60000
	minimumCalculationMillisForPreview = 100
	#Do not apply two-stage missing preview to small craft requests. Small requests stay on AE2's normal calculation path.
	#Range: 1 ~ 9223372036854775807
	minimumRequestedAmountForPreview = 1024
	#Maximum number of preliminary missing entries shown. The current safe implementation supports one entry.
	#Range: 0 ~ 1
	previewMaximumEntries = 1
	#Output id or key-string fragments treated as heavy process families. Useful for Astral-style celestial/electronic process lines. These hints prioritize cached preliminary previews; they never change AE2's final crafting result.
	heavyProcessHints = ["astral_mekanism:", "celestial", "electronic"]
	#Share an already-running AE2 crafting calculation when the exact same requester asks for the exact same output, amount, and calculation strategy again. This does not cache completed plans and does not alter AE2's final result.
	deduplicateActiveCraftingCalculations = true
	#Maximum age of an active calculation entry that can be reused, in server ticks. Completed, cancelled, or expired entries are ignored.
	#Range: 1 ~ 1200
	activeCalculationDeduplicationWindowTicks = 200
	#Log active crafting calculation single-flight hits and table clears. Disabled by default to avoid log spam.
	logCraftingCalculationDeduplication = false
	#Cache short-lived completed crafting plans for identical requests. By default only missing/simulation plans are reused; successful plans require cacheSuccessfulCompletedCraftingPlans.
	cacheCompletedCraftingPlans = true
	#Also cache completed successful crafting plans. Disabled by default because successful plans can become stale when storage changes between calculation and submission.
	cacheSuccessfulCompletedCraftingPlans = false
	#Maximum completed crafting plans cached per JVM.
	#Range: 0 ~ 65536
	completedCraftingPlanCacheSize = 1024
	#Time-to-live for completed crafting plan cache entries, in server ticks. Storage or crafting topology invalidation clears this earlier.
	#Range: 1 ~ 1200
	completedCraftingPlanCacheTtlTicks = 40
	#For REPORT_MISSING_ITEMS requests, return an immediate missing-only plan only when the optimizer can prove the craft is impossible through a strict deterministic preflight. Item, fluid, and chemical keys use the same proof path. Successful or ambiguous crafts still use AE2's normal solver.
	fastFailMissingCrafts = true
	#Do not run deterministic missing preflight below this requested amount.
	#Range: 1 ~ 9223372036854775807
	minimumRequestedAmountForFastFail = 1
	#Maximum recursive depth for deterministic missing preflight.
	#Range: 1 ~ 1024
	deterministicPreflightMaxDepth = 64
	#Maximum recipe graph nodes visited by deterministic missing preflight before falling back to AE2.
	#Range: 1 ~ 1000000
	deterministicPreflightMaxNodes = 4096
	#Log when deterministic missing preflight returns a missing-only plan.
	logFastFailMissingCrafts = false
	#Cache AE2 CraftingService.getCraftingFor(output) lookups until crafting providers or network nodes change. This is a read-through cache only.
	cachePatternLookups = true
	#Maximum cached pattern lookup entries per JVM.
	#Range: 0 ~ 1000000
	patternLookupCacheSize = 8192
	#Cache CraftingService.getCraftables(filter) results until crafting providers or network nodes change. This targets terminals and provider scans; it does not cache completed crafting plans.
	cacheCraftableSets = false
	#Maximum cached craftable-set entries per JVM.
	#Range: 0 ~ 65536
	craftableSetCacheSize = 256
	#Log pattern lookup cache hits and clears. Disabled by default to avoid log spam.
	logPatternLookupCache = false

[craftingExecution]
	#Limit how many pattern pushes a single crafting CPU may burst through AE2's crafting execution window. This is the main TPS protection for giant CPUs: capacity and displayed co-processors stay unchanged, but per-tick pattern pushes are bounded.
	throttleCraftingExecution = true
	#Maximum effective co-processors one CPU may spend in AE2's crafting execution window. The default matches AQE's non-experimental full structure. Raise to 2147483646 only for explicit maximum-value testing.
	#Range: 1 ~ 2147483646
	maxEffectiveCoprocessorsPerCpu = 264192
	#Adapt each active crafting CPU's effective execution budget based on observed server-side execution time. This keeps CrazyAE-class CPUs useful without letting one CPU spend the whole server tick.
	adaptiveCraftingExecutionBudget = true
	#Target maximum time in milliseconds that one crafting CPU execution burst should spend in a server tick before its adaptive budget is reduced.
	#Range: 1 ~ 50
	targetCraftingExecutionMillis = 4
	#Lowest adaptive effective co-processor budget per CPU. Small CPUs below this value are not slowed further.
	#Range: 1 ~ 2147483646
	minimumAdaptiveCoprocessorsPerCpu = 1024
	#Share a real-time execution budget between all standard AE2 crafting CPUs on the same ME grid. This only paces pattern pushes after planning has completed.
	sharedCraftingExecutionBudget = true
	#Target total time in milliseconds that standard AE2 crafting CPUs on one ME grid may spend pushing patterns in one server tick. Every active CPU still receives a small progress allowance.
	#Range: 1 ~ 45
	sharedCraftingExecutionMillisPerGrid = 8
	#Minimum pattern-push operations granted to an active CPU after its ME grid has consumed the shared tick budget. Keep this low to prevent many CPUs from recreating a large burst.
	#Range: 1 ~ 65536
	minimumSharedOperationsPerCpu = 1
	#Log when a crafting CPU's execution burst is capped. Disabled by default to avoid log spam on large systems.
	logCraftingExecutionThrottling = false

[compatibility]

	[compatibility.neoEcoAe]
		#Apply ACO's adaptive per-CPU and shared per-grid pattern-push budgets to Neo ECO AE Extension's custom ECO CPU.
		#Neo ECO's own normal, batch, and aggressive fast paths remain authoritative; ACO only bounds their per-tick execution window.
		#Supported target: Neo ECO AE Extension 20.3.x.
		throttleNeoEcoAeExecution = true

[gridTickBudget]
	#Enable server-side budget controls for selected AE2 grid tickables such as IO ports, import/export buses, and ExtendedAE circuit cutters. Disabled by default because AE2 buses are correctness-sensitive and must be opt-in tested per pack.
	enableGridTickBudget = false
	#When enabled, selected AE2 grid tickables are deferred with TickRateModulation.SLOWER after the per-server-tick budget is spent or after a slow tick triggers backoff.
	deferHeavyGridTickables = false
	#Total server tick time budget, in milliseconds, spent by selected AE2 grid tickables before later matching devices are deferred. This is not a hard JVM preemption; it only affects future tickable calls in the same tick.
	#Range: 1 ~ 45
	gridTickBudgetMillisPerServerTick = 6
	#Minimum spacing between executions for selected AE2 grid tickables. 1 keeps normal AE2 scheduling unless the budget or slow backoff triggers.
	#Range: 1 ~ 200
	gridTickMinimumIntervalTicks = 1
	#Diagnostic threshold for one selected AE2 grid tickable call, in microseconds.
	#Range: 1 ~ 1000000
	slowGridTickableMicros = 2000
	#If one selected AE2 grid tickable call exceeds slowGridTickableMicros, defer that device for this many ticks. 0 disables per-device slow backoff.
	#Range: 0 ~ 200
	slowGridTickableBackoffTicks = 2
	#Apply a short backoff to selected AE2 grid tickables that repeatedly report no work. This targets empty import buses, full export targets, blocked IO ports, and similar failed polling loops.
	backoffIdleGridTickables = false
	#How many consecutive IDLE/SLOWER returns a selected tickable may produce before idle backoff starts.
	#Range: 1 ~ 1000
	idleGridTickableBackoffAfterFailures = 4
	#How many ticks to defer a selected repeatedly-idle tickable.
	#Range: 1 ~ 200
	idleGridTickableBackoffTicks = 5
	#Class-name fragments selected for AE2 grid tick budgeting. Keep this narrow; matching devices may run later under load.
	heavyGridTickableClassHints = ["appeng.parts.automation.ImportBusPart", "appeng.parts.automation.ExportBusPart", "appeng.blockentity.storage.IOPortBlockEntity", "com.glodblock.github.extendedae.common.tileentities.TileCircuitCutter", "com.glodblock.github.extendedae.common.tileentities.TileExIOPort", "com.glodblock.github.extendedae.common.parts.PartExImportBus", "com.glodblock.github.extendedae.common.parts.PartExExportBus", "com.glodblock.github.extendedae.common.parts.PartPreciseExportBus", "com.glodblock.github.extendedae.common.parts.PartTagExportBus", "com.glodblock.github.extendedae.common.parts.PartThresholdExportBus", "com.glodblock.github.extendedae.common.parts.PartModExportBus"]
	#Cap AE2 import/export bus operations per tick after other mods apply their speed-card changes. This does not change storage contents or filters; it only prevents one bus from doing an extreme burst in one tick.
	limitIoBusOperationsPerTick = false
	#Maximum operations per tick for AE2 import/export buses when limitIoBusOperationsPerTick is enabled. Vanilla AE2 tops out at 96; this default still allows accelerated buses while avoiding integer-saturated bursts.
	#Range: 1 ~ 2147483646
	maxIoBusOperationsPerTick = 4096
	#Throttle repeated failed crafting requests from AE2 MultiCraftingTracker owners such as export buses with crafting cards. Successful or in-progress jobs are not throttled.
	throttleExportBusCraftRequests = false
	#Cooldown after a crafting request finishes without producing a crafting link, in ticks.
	#Range: 1 ~ 1200
	exportBusCraftFailureCooldownTicks = 40
	#Maximum remembered failed export-bus-style crafting requests.
	#Range: 1 ~ 1000000
	exportBusCraftThrottleCacheSize = 4096
	#Log slow/deferred selected AE2 grid tickables. Disabled by default to avoid log spam.
	logGridTickBudget = false

[uelOptimizations]
	#Reuse a non-null adjacent Forge capability for the remainder of the current server tick. The block entity identity is checked on every lookup, and missing capabilities are never cached.
	cacheAdjacentCapabilityLookups = true
	#Keep a successful adjacent capability across ticks until Forge invalidates its LazyOptional. The block entity identity is still checked on every access. Disabled by default for unusual capability providers that do not invalidate correctly.
	cacheAdjacentCapabilitiesAcrossTicks = false
	#Remember exact failed import/export insertion simulations for one server tick. Successful simulations and real transfers are always executed normally.
	cacheNegativeBusTransferSimulations = true
	#Remove only null, duplicate-by-identity, or structurally invalid pattern candidates before AE2 builds crafting branches. Inventory availability is never used to reject a valid pattern.
	pruneInvalidCraftingCandidates = true
	#Memoize only calculation-invariant AE2 queries inside one crafting job: emit checks, pattern lists, fuzzy craftable alternatives, and container returns. Mutable simulated inventory amounts are never cached.
	memoizeCraftingCalculationQueries = true
	#Combine repeated refreshes of the same Pattern Provider during one server tick. Pending refreshes are flushed before every crafting read and at server end tick.
	coalesceCraftingProviderRefreshes = true
	#Fingerprint Pattern Provider content and rebuild AE2's provider indexes only when patterns, outputs, inputs, emitables, or priority actually change. Cleared on datapack reload.
	trackProviderPatternGenerations = true
	#Process AE2 IO Port cell slots from a persistent round-robin cursor instead of restarting at slot zero. Every selected cell transfer still uses AE2's original atomic transfer routine.
	incrementalIoPortProcessing = true
	#Maximum IO Port input-cell slots inspected per grid tick when incremental processing is enabled.
	#Range: 1 ~ 6
	ioPortCellSlotsPerTick = 2
	#Compatibility key. The custom Import Bus transfer Mixin is unregistered; AE2 always owns extraction and insertion.
	cacheImportBusLastSuccessfulSlot = false
	#Reuse Export Bus configured candidate keys until the bus configuration is changed. Fuzzy lookup and actual extraction/insertion remain validated by AE2.
	cacheExportBusCandidateKeys = true
	#Allow at most one immediate ME terminal filter/sort rebuild per client tick. Experimental and disabled by default to keep clickable virtual slots synchronized with the current repository generation.
	coalesceClientTerminalViewUpdates = false
	#Project terminal names, IDs, tags, tooltips, and sort keys on the client thread, then offload only immutable search matching and sorting. Stale generations are discarded. Disabled by default.
	asyncTerminalSearchSort = false
	#Minimum terminal entry count before the safe asynchronous amount-sort path is used.
	#Range: 128 ~ 1000000
	asyncTerminalMinimumEntries = 2048
	#Stop AE2 scrollbar page-repeat when the physical left mouse button is already released. Prevents Pattern Access Terminal scrolling from continuing after another screen mod loses the mouse-up event.
	fixStuckAe2ScrollbarRepeat = true
	#Share validated ExtendedAE Circuit Cutter recipe candidates between machines with identical item/fluid inputs. ExtendedAE still performs its own test before a cached recipe is used.
	cacheCircuitCutterRecipes = true
	#Share exact ExtendedAE Circuit Cutter no-recipe results for identical item/fluid inputs. Negative results are invalidated on input change naturally and globally on datapack reload.
	cacheCircuitCutterNegativeResults = true
	#Maximum validated ExtendedAE Circuit Cutter input signatures retained until a datapack reload.
	#Range: 16 ~ 262144
	circuitCutterRecipeCacheSize = 4096

[addonMachineOptimizations]
	#Master switch for conservative AdvancedAE, ExtendedAE, and AE2 Overclock machine optimizations. These paths cache duplicate lookups only; they do not reduce machine throughput or change recipes.
	enableAddonMachineOptimizations = true
	#Reuse the AdvancedAE Reaction Chamber recipe already resolved after an inventory change instead of immediately searching the same inputs again.
	cacheReactionChamberRecipe = true
	#Cache Field and Method metadata used by AE2 Overclock's own runtime helper classes. Invocation and recipe validation still run normally.
	cacheAe2OverclockReflection = true
	#Invoke cached Methods used by AE2 Overclock runtime helpers through prebuilt MethodHandles, with reflection fallback.
	useAe2OverclockMethodHandles = true
	#Reuse AE2 Overclock overclock/parallel card counts for the same machine during one server tick. Upgrade changes are visible no later than the next tick.
	cacheAe2OverclockUpgradeCounts = true
	#Reuse ExtendedAE Assembly Matrix crafter used-thread counts during one server tick. The cache is invalidated before execution and on every job, inventory, state, load, or stop change.
	cacheAssemblerMatrixThreadCounts = true
	#Reuse the complete ExtendedAE Assembly Matrix busy-thread total during one server tick, invalidating it whenever a crafter status is updated.
	cacheAssemblerMatrixBusyCount = true
	#Coalesce identical ExtendedAE Assembly Matrix visual/status broadcasts for the same cluster and server tick. Structure formation and destruction are not skipped.
	coalesceAssemblerMatrixStatusUpdates = true
	#Reuse the last available ExtendedAE Assembly Matrix crafter until its thread state or the multiblock structure changes, validating capacity before every use.
	cacheAssemblerMatrixRouting = true

[storageSync]
	#Throttle AE2 StorageService watcher updates. ME terminal/monitor visible storage updates may be delayed by the configured interval, but storage contents are not changed.
	throttleStorageWatcherUpdates = false
	#Storage watcher update interval in ticks when throttling is enabled. 1 is vanilla behavior.
	#Range: 1 ~ 40
	storageWatcherUpdateIntervalTicks = 4
	#Throttle ME terminal server-side inventory snapshots. Disabled by default because stale zero-stock entries can interfere with interactive terminal slots in heavily modified clients.
	throttleTerminalInventorySnapshots = false
	#How often an open ME terminal should rebuild its server-side available-stack snapshot.
	#Range: 1 ~ 40
	terminalInventorySnapshotIntervalTicks = 4
	#Cache the craftable set used by open ME terminals for a few ticks. Disabled by default so zero-stock transitions use AE2's immediate terminal state.
	cacheTerminalCraftables = false
	#How many ticks an open ME terminal may reuse its craftable set.
	#Range: 1 ~ 40
	terminalCraftableCacheTicks = 4
	#Reserved safety option for future visible-sync buffering. Current implementation does not delay screen-open synchronization.
	flushImmediatelyOnScreenOpen = true
	#Reserved safety option for future visible-sync buffering. Current implementation clears preview cache on storage invalidation instead of buffering cell changes.
	flushImmediatelyOnCellChange = true
	#Reserved safety option for future visible-sync buffering. Current implementation does not buffer topology changes.
	flushImmediatelyOnNetworkTopologyChange = true
	#Reserved safety ceiling for future visible-sync buffering. Current implementation does not buffer individual storage changes.
	#Range: 1 ~ 1000000
	maximumBufferedChanges = 4096

[deepAe2Rewrite]
	#Master switch for the independently configurable UEL/GTNH-inspired deep optimizations below. Disable this to return every deep path to AE2 behavior without changing the individual settings.
	enableDeepAe2RewriteFlags = true
	#Experimental: reorder equivalent output patterns by how many direct inputs are currently available. AE2 still validates every branch and decides whether the craft succeeds.
	patternSelectionByAvailability = false
	#Maximum number of patterns for one output that the availability sorter may inspect. Larger sets retain AE2's original order to bound calculation overhead.
	#Range: 2 ~ 4096
	patternSelectionMaximumCandidates = 64
	#Coalesce AE2 StorageService watcher rebuilds into a short interval. Direct inventory operations remain immediate; only cached aggregate/watcher refresh work is paced.
	networkForceUpdateCoalescing = false
	#Maximum interval between coalesced StorageService aggregate rebuilds.
	#Range: 1 ~ 40
	networkUpdateIntervalTicks = 2
	#Split terminal full/delta synchronization into bounded rolling ranges. Experimental and disabled by default because interactive virtual slots require one coherent AE2 update generation.
	visibleTerminalRangeSync = false
	#Maximum terminal entries serialized per menu tick while rolling range synchronization is active.
	#Range: 64 ~ 32767
	terminalRangeEntriesPerTick = 4096
	#AE2 15.4.10 already reevaluates P2P topology only on structural changes. This option coalesces duplicate full input-tunnel wake sweeps caused by boot/power events and never suppresses add/remove/frequency callbacks.
	p2pTopologyChangeOnlyRecheck = true
	#Duplicate P2P network-change suppression window. Keep this at 1 unless testing a known topology event storm.
	#Range: 1 ~ 20
	p2pDuplicateWindowTicks = 1
	#Experimental: reuse short-lived immutable fuzzy-search results used by export buses. Non-fuzzy transfers and AE2's insertion/extraction validation remain unchanged.
	busSearchRewrite = false
	#Lifetime of export-bus fuzzy search results. Keep short because storage amounts can change every tick.
	#Range: 1 ~ 20
	busFuzzySearchCacheTicks = 2
	#Maximum cached fuzzy-search keys shared by export buses.
	#Range: 16 ~ 262144
	busFuzzySearchCacheSize = 4096
	#Use an allocation-light exact-input path for single-fluid crafting inputs. AE2 15.4.10 already stores fluids as first-class GenericStack values, so no dummy-item conversion is introduced.
	fluidPatternRework = true
	#Log active deep optimization paths and their limits on server start.
	logDeepAe2RewriteFlags = true

[recipeIntentBridge]
	#Enable the AE2 Pattern Provider recipe intent bridge inside ACO. Current implementation records short-lived intents only; machine fast paths remain separate switches below.
	enableRecipeIntentBridge = true
	#Record successful AE2 Pattern Provider pushes as short-lived recipe intents. This is the intent-based crafting foundation for GTCEu, Mekanism, and future Create fast paths.
	capturePatternProviderRecipeIntents = true
	#How long a captured recipe intent remains visible to machine integrations. Keep short to avoid stale machine-side hints.
	#Range: 1 ~ 600
	recipeIntentTtlTicks = 20
	#Hard cap for captured recipe intent entries. Oldest entries are evicted when the cap is exceeded.
	#Range: 16 ~ 1048576
	maximumRecipeIntentEntries = 4096
	#Compatibility-disabled in ACO 1.1.1. The key is retained so existing world configs remain readable.
	#Aggregate machine acceptance cannot prove that every represented processing-pattern execution will produce its declared output, so AE2's original one-execution accounting is always used.
	enablePatternMicroBatching = false
	#Maximum identical processing-pattern executions collapsed into one external-inventory push. This reduces Pattern Provider calls; it does not grant extra co-processors or bypass the crafting execution budget.
	#Range: 2 ~ 1048576
	maxPatternExecutionsPerMicroBatch = 65536
	#Only micro-batch Pattern Providers configured with exactly one target side. Keeping this true preserves deterministic routing and is strongly recommended.
	requireSinglePatternProviderTarget = true
	#Registry namespaces of adjacent machine blocks allowed to receive aggregate pattern pushes. Every target still has to accept the full aggregate atomically through AE2's original Pattern Provider adapter.
	patternMicroBatchTargetNamespaces = ["gtceu", "mekanism"]
	#Enable GTCEu recipe intent fast path. When a GTCEu machine has a fresh AE2 Pattern Provider intent for its position, ACO tries matching output-indexed GT recipes before GTCEu's normal full search. If no candidate works, GTCEu's original search still runs.
	enableGtceuRecipeIntentFastPath = true
	#Maximum GTCEu output-matched recipe candidates to prepend before falling back to GTCEu's original iterator. Lower values reduce worst-case work when many recipes share one output.
	#Range: 1 ~ 1024
	gtceuRecipeIntentMaximumCandidates = 16
	#Maximum GTCEu recipe type indexes kept by ACO. Each index maps output item and fluid ids to GT recipes for that recipe type.
	#Range: 1 ~ 1024
	gtceuRecipeIntentIndexCacheSize = 64
	#Maximum block radius used to associate a GTCEu multiblock controller with an intent delivered to one of its input buses or hatches. Zero limits matching to the controller position itself. Spatial chunk buckets keep this lookup bounded.
	#Range: 0 ~ 64
	gtceuRecipeIntentSearchRadius = 16
	#Maximum nearby Pattern Provider intents considered for one GTCEu recipe search.
	#Range: 1 ~ 4096
	gtceuRecipeIntentNearbyMaximumEntries = 64
	#Log GTCEu recipe intent hits, candidate counts, and reflection/index failures. Disabled by default to avoid log spam.
	logGtceuRecipeIntentFastPath = false
	#Enable Mekanism recipe intent fast path. When a Mekanism machine has a fresh AE2 Pattern Provider intent for its position, ACO tries matching output-indexed Mekanism recipes and validates them with Mekanism's own recipe test before the normal lookup runs.
	enableMekanismRecipeIntentFastPath = true
	#Maximum Mekanism output-matched recipe candidates to test before falling back to Mekanism's original recipe lookup.
	#Range: 1 ~ 1024
	mekanismRecipeIntentMaximumCandidates = 16
	#Maximum Mekanism recipe type indexes kept by ACO. Each index maps item, fluid, and chemical output ids to Mekanism recipes for that recipe type.
	#Range: 1 ~ 1024
	mekanismRecipeIntentIndexCacheSize = 128
	#Reuse short-lived, already validated machine recipe intent candidates. Mekanism still runs its own recipe test on every hit, and GTCEu still runs its original candidate validation.
	cacheResolvedRecipeIntents = true
	#Maximum resolved recipe-intent entries shared by each optional machine integration. Entries also expire with the originating Pattern Provider intent and are cleared on recipe reload.
	#Range: 16 ~ 1048576
	resolvedRecipeIntentCacheSize = 8192
	#Log Mekanism recipe intent hits, candidate counts, and reflection/index failures. Disabled by default to avoid log spam.
	logMekanismRecipeIntentFastPath = false
	#Reserved Create machine recipe fast path. Disabled and not active in this build; captured intents are available for diagnostics and future implementation.
	enableCreateRecipeIntentFastPath = false
	#Log each captured Pattern Provider recipe intent. Leave false unless debugging a specific machine line.
	logCapturedRecipeIntents = false
	#Log recipe intent expiration, clears, and hard-cap evictions.
	logRecipeIntentRegistryEvictions = false

[transactionalPatternBatching]
	#Enable ACO's accepted-execution-count batch API. Only registered adapters may handle a batch; unsupported providers always use AE2's original path.
	#The built-in adapter preserves one pushPattern call per accepted execution and never treats aggregate inventory insertion as recipe completion.
	enableTransactionalPatternBatching = false
	#Maximum exact processing-pattern executions prepared by one ACO batch transaction. The selected adapter may accept fewer.
	#Range: 2 ~ 1048576
	maxTransactionalPatternBatchExecutions = 65536
	#Enable the conservative built-in Pattern Provider adapter. It returns the exact number of successful one-execution AE2 pushes and stops immediately on provider backpressure.
	enableSequentialPatternProviderBatchAdapter = false
	#Maximum one-execution pushPattern calls made by the conservative adapter in one transaction. Instant dispatch may run more than one bounded transaction. Native adapters use their own acceptance limits.
	#Range: 1 ~ 65536
	maxSequentialProviderExecutionsPerCall = 256
	#Time-slice AE2's original one-pattern-at-a-time dispatch loop at wave boundaries.
	#No aggregate input stack is created: AE2 remains responsible for extraction, provider backpressure, waiting outputs, energy, and task accounting.
	enableInstantPatternDispatch = true
	#Per-CPU wall-clock budget for sequential Instant dispatch in one server tick. The grid-wide crafting budget may stop it earlier.
	#Range: 1 ~ 45
	instantPatternDispatchTimeBudgetMillis = 4
	#Cold-start wave size before ACO has measured the cost of one normal AE2 pattern push.
	#This limits only one timing wave, not the total number dispatched during the tick.
	#Range: 1 ~ 65536
	instantPatternDispatchProbeOperations = 65536
	#Maximum operations passed to one measured AE2 execution wave.
	#ACO may run many waves until maxPatterns, provider backpressure, or the CPU/grid time budget is reached.
	#Range: 1 ~ 1048576
	instantPatternDispatchMaximumWaveOperations = 65536
	#Maximum experimental V2 aggregate-adapter transactions per call. This does not limit sequential Instant dispatch.
	#Range: 1 ~ 65536
	maxInstantPatternDispatchTransactions = 1024
	#Require one configured Pattern Provider target side before using a transactional batch adapter. This keeps target ownership deterministic.
	requireSingleTransactionalBatchTarget = true
	#Registry namespaces eligible for ACO's transactional Pattern Provider batching. Unlisted targets use AE2's original execution path.
	transactionalBatchTargetNamespaces = ["gtceu", "mekanism"]

[experimentalCraftingEngine]
	#Master switch for ACO's next-generation compiled planner, native machine batching, fair scheduler, and persistent transaction journal.
	#This is deliberately false. The implementation can be built and tested without changing live AE2 behavior.
	enableExperimentalCraftingEngine = false
	#Compare the compiled long planner with completed AE2 plans without replacing or modifying AE2's result.
	#Requires enableExperimentalCraftingEngine. Shadow mismatches only update diagnostics.
	enableShadowMode = false
	#Log the first bounded set of Shadow Mode differences. Disabled engine means no comparison or logging.
	logShadowMismatches = true
	#Skip Shadow Mode validation above this many patterns to keep diagnostic work bounded.
	#Range: 1 ~ 1048576
	shadowMaximumPatterns = 262144
	#Build an immutable, generation-keyed crafting graph for experimental planning.
	enableCompiledCraftingGraph = false
	#Use a compiled plan only for the strictly provable single-pattern path. Any ambiguity, generation change, fuzzy input, overflow, or unsupported recipe falls back to AE2.
	#Kept false until the user completes live comparison testing.
	enableAuthoritativeCompiledPlanner = false
	#Reject AE2 tree calculations before unchecked long/double arithmetic can wrap or saturate.
	#This does not make a standard AE2 job BigInteger-capable; oversized work must use execution windows.
	enableCheckedAe2CraftingArithmetic = true
	#Use the prepare/commit/account/reconcile transaction protocol. Kept false until recovery testing is complete.
	enableTransactionalBatchingV2 = false
	#Allow the V2 transaction engine to use the exact-recipe GTCEu native batch adapter. Unsupported recipes always fall back.
	enableGtceuNativeBatching = false
	#Allow the V2 transaction engine to use the exact-recipe Mekanism item/fluid/chemical native batch adapter. Unsupported recipes always fall back.
	enableMekanismNativeBatching = false
	#Use the experimental deficit-round-robin scheduler for multiple crafting jobs. Kept false until multiplayer soak testing.
	enableFairCraftingJobScheduler = false
	#Shared hard operation budget for the experimental scheduler per server tick.
	#Range: 1 ~ 1048576
	fairSchedulerOperationsPerTick = 4096
	#Deficit-round-robin operation quantum granted to each runnable job per scheduling round.
	#Range: 1 ~ 65536
	fairSchedulerQuantum = 64
	#Shared wall-clock budget for experimental scheduling in one server tick.
	#Range: 1 ~ 45
	fairSchedulerTimeBudgetMillis = 4
	#Persist non-terminal V2 batch transactions in overworld SavedData/NBT before target ownership transfer.
	#Disabling this also disables transactional V2 execution; V2 is never allowed to run without recovery state.
	persistBatchTransactionJournal = true
	#Hard cap for non-terminal persistent transaction records. New native batches fall back when full.
	#Range: 16 ~ 16384
	batchTransactionJournalMaximumEntries = 16384
	#Interval between bounded recovery scans for prepared or target-accepted transactions.
	#Range: 1 ~ 1200
	batchTransactionReconciliationIntervalTicks = 20
	#Hard per-transaction execution cap shared by native machine adapters. Machine limits may reduce it further.
	#Range: 1 ~ 1048576
	nativeBatchMaximumExecutions = 65536
	#Expose ACO's versioned BigInteger host and job backend to explicitly integrated CPU add-ons.
	#This does not patch normal AE2 CPUs. It is safe to leave enabled when no compatible host add-on is installed.
	enableBigIntegerCraftingBackend = true
	#Execute explicitly submitted BigInteger root jobs as bounded standard AE2 child jobs on an AQE Quantum Computer.
	#False until phase-9 live testing. Capacity display and ordinary long jobs continue to work while this is false.
	enableBigIntegerGameplayExecution = false
	#Maximum magnitude stored by the BigInteger backend, in binary bits. 256 bits is about 77 decimal digits.
	#The hard implementation range is 64..1048576 bits; larger values are rejected before NBT or packet allocation.
	#Range: 64 ~ 1048576
	bigIntegerMaximumBits = 256
	#Maximum pattern executions exposed to a long/int machine adapter in one BigInteger execution window.
	#Larger jobs remain BigInteger counters and are resumed through additional windows.
	#Range: 1 ~ 1048576
	bigIntegerExecutionWindow = 65536
	#Maximum new BigInteger child-plan calculations started in one server tick.
	#Each Big job can own at most one unfinished child window, so this does not create an unbounded CPU list.
	#Range: 1 ~ 64
	bigIntegerMaximumWindowCalculationsPerTick = 4
	#Backoff after a child plan is missing, rejected, or cancelled before retrying that BigInteger job.
	#Range: 1 ~ 1200
	bigIntegerRetryBackoffTicks = 20
	#Maximum job summaries carried by one BigInteger crafting-status page.
	#Range: 16 ~ 16384
	bigIntegerStatusPageEntries = 1024
	#Aggregate memory-accounting budget for BigInteger count magnitudes in one CPU runtime, in MiB.
	#New jobs or output reservations fall back before exceeding this bound.
	#Range: 32 ~ 4096
	bigIntegerRuntimeCountBudgetMiB = 256

[diagnostics]
	#Log AE2 crafting calculations that take longer than slowCraftCalculationMillis.
	logSlowCraftCalculations = true
	#Slow crafting calculation threshold in milliseconds.
	#Range: 1 ~ 300000
	slowCraftCalculationMillis = 500
	#Log preliminary missing preview cache hits, writes, and clears.
	logCacheStatistics = false

