
#General settings
[general]
	#The minimum tick speed machines can be set to. Defaults to 1, meaning every tick
	#Range: 1 ~ 100
	minimum_machine_tick_speed = 1

#Generator T1
[generator_t1]
	#The amount of Energy created per burn tick of fuel. Coal has 1600 burn ticks. Sticks have 100 burn ticks.
	#Range: > 1
	generator_t1_fe_per_fuel_tick = 15
	#The multiplier for the burn speed, making the generator run faster. Coal is 1600 ticks to burn, if you set this to 10, it will burn in 160 ticks
	#Range: 1 ~ 1000
	generator_t1_burn_speed_multiplier = 4
	#The maximum amount of Energy the generator can hold in its buffer
	#Range: > 1
	generator_t1_max_fe = 1000000
	#The FE per Tick that the generator outputs
	#Range: > 1
	generator_t1_fe_per_tick = 1000

#Generator Fluid T1
[generator_fluid_t1]
	#Max FE capacity for the Fluid Generator T1
	#Range: > 1
	generator_fluid_t1_max_fe = 1000000
	#FE output per tick for the Fluid Generator T1
	#Range: > 1
	generator_fluid_t1_fe_per_tick = 1000

#Energy Transmitter T1
[energy_transmitter_t1]
	#The maximum energy storage
	#Range: > 1
	energy_transmitter_t1_max_rf = 1000000
	#The maximum RF transmitted per tick to machines and other transmitters
	#Range: > 1
	energy_transmitter_t1_rf_per_tick = 1000
	#The energy loss per block distance in percent
	#Range: 0.0 ~ 100.0
	energy_transmitter_t1_loss_per_block = 1.0

#Fuel Canister
[fuel_canister]
	#The amount of ticks 'consumed' per operation in the furnace. Lower is more efficient fuel use.
	#Range: > 100
	fuel_canister_minimum_ticks_consumed = 200
	#The maximum amount of fuel (in ticks) permitted in the fuel canister.
	#Range: > 100
	fuel_canister_maximum_fuel = 10000000

#Pocket Generator
[pocket_generator]
	#The amount of Energy created per burn tick of fuel. Coal has 1600 burn ticks. Sticks have 100 burn ticks.
	#Range: > 1
	pocket_gen_fe_per_fuel_tick = 15
	#The multiplier for the burn speed, making the generator run faster. Coal is 1600 ticks to burn, if you set this to 10, it will burn in 160 ticks
	#Range: 1 ~ 1000
	pocket_gen_burn_speed_multiplier = 4
	#The maximum amount of Energy the generator can hold in its buffer
	#Range: > 1
	pocket_gen_max_fe = 1000000
	#The FE per Tick that the generator charges other items at
	#Range: > 1
	pocket_gen_fe_per_tick = 5000

#Time Crystals
[time_crystal]
	#Do you want to customize Time Crystal Growth Dimensions? If set to true, the following 3 fields MUST be populated. Defaults to false, which means normal growth rules: Stage 1 = Overworld, Stage 2 = Nether, Stage 3 = End.
	time_crystal_custom_dimensions = false
	#Dimensions where Stage 0 -> Stage 1 growth occurs. Example: ["minecraft:overworld"]
	time_crystal_stage1_dimensions = ["minecraft:overworld"]
	#Dimensions where Stage 1 -> Stage 2 growth occurs. Example: ["minecraft:the_nether"]
	time_crystal_stage2_dimensions = ["minecraft:the_nether"]
	#Dimensions where Stage 2 -> Stage 3 growth occurs. Example: ["minecraft:the_end"]
	time_crystal_stage3_dimensions = ["minecraft:the_end"]

#Fluid Fuel FE per mB values
[fluid_fuel]
	#FE generated per mB of Refined Fuel T2
	#Range: > 1
	fuel_tier2_fe_per_mb = 4000
	#FE generated per mB of Refined Fuel T3
	#Range: > 1
	fuel_tier3_fe_per_mb = 16000
	#FE generated per mB of Refined Fuel T4
	#Range: > 1
	fuel_tier4_fe_per_mb = 64000

#Paradox Machine
[paradox_machine]
	#Max RF capacity of the Paradox Machine
	#Range: > 1
	paradox_total_rf_capacity = 10000000
	#Max fluid capacity (mB) of the Paradox Machine
	#Range: > 1
	paradox_total_fluid_capacity = 64000
	#RF cost per block restored
	#Range: > 0
	paradox_rf_per_block = 1000
	#RF cost per entity restored
	#Range: > 0
	paradox_rf_per_entity = 5000
	#Fluid cost (mB) per block restored
	#Range: > 0
	paradox_fluid_per_block = 10
	#Fluid cost (mB) per entity restored
	#Range: > 0
	paradox_fluid_per_entity = 50
	#Paradox energy generated per block restored
	#Range: 0.0 ~ 1.7976931348623157E308
	paradox_energy_per_block = 0.5
	#Paradox energy generated per entity restored
	#Range: 0.0 ~ 1.7976931348623157E308
	paradox_energy_per_entity = 2.0
	#Max paradox energy before a ParadoxEntity spawns
	#Range: 1.0 ~ 1.7976931348623157E308
	paradox_energy_max = 100.0
	#If true, only safe mob data fields are restored
	paradox_restricted_mobs = true
	#Additional blocks the Paradox Machine cannot save/restore, matched by regex against the full block ID.
	#Each entry is a regex searched (not fully matched) against the block ID, so partial matches work.
	#Only blocks the Paradox Machine would otherwise be allowed to touch (the paradox_allow block tag,
	#ores by default) are affected - this list can only narrow that, not widen it.
	#Example: ".*reative.*" blocks all blocks with "reative" in their ID (e.g. all Creative blocks),
	#or "seeds" blocks any block whose ID contains "seeds".
	paradox_block_blacklist = [".*kubejs.*", ".*creative.*"]
	#Additional entities the Paradox Machine cannot save/restore, matched by regex against the full entity ID.
	#Each entry is a regex searched (not fully matched) against the entity ID, so partial matches work.
	#Example: "draconicevolution:chaos_guardian" blocks that exact entity,
	#or "^draconicevolution:" blocks all entities from that mod.
	paradox_entity_blacklist = []

#Polymorphic Wand
[polymorphic_wand]
	#Maximum mB of polymorphic fluid the wand can hold
	#Range: > 1
	polymorphic_wand_max_fluid = 8000

#Time Wand
[time_wand]
	#The maximum amount of Energy the Time Wand can hold in its buffer
	#Range: > 1
	time_wand_rf_capacity = 100000
	#FE cost per use, multiplied by the acceleration rate (2^level)
	#Range: > 0
	time_wand_rf_cost = 100
	#Max mB of time fluid the Time Wand can hold
	#Range: > 1
	time_wand_max_fluid = 8000
	#Time Fluid cost per use, multiplied by the acceleration rate (2^level)
	#Range: 0.0 ~ 1.7976931348623157E308
	time_wand_fluid_cost = 16.0
	#Maximum tick speed multiplier (must be a power of 2, e.g. 256 = up to 2^8 = 256x)
	#Range: > 2
	time_wand_max_multiplier = 256
	#Can fake players (e.g. Clickers) use the Time Wand?
	time_wand_fake_player_allowed = false
	#Blocks the Time Wand cannot accelerate, matched by regex against the full block ID.
	#Each entry is a regex searched (not fully matched) against the block ID, so partial matches work.
	#Example: "draconicevolution:chaos_crystal" blocks that exact block,
	#or "^draconicevolution:" blocks all blocks from that mod.
	#Note: the tick_speed_deny block tag also controls this and is checked first.
	time_wand_block_blacklist = ["^kubejs:", "^avaritia:", "^draconicevolution:"]

#Advanced Portal Gun
[portal_gun]
	#Max FE capacity of the Portal Gun
	#Range: > 1
	portal_gun_max_fe = 1000000
	#FE cost per portal shot
	#Range: > 0
	portal_gun_fe_cost = 5000
	#Max mB of portal fluid the Portal Gun can hold
	#Range: > 1
	portal_gun_max_fluid = 8000
	#mB of portal fluid consumed per shot
	#Range: > 0
	portal_gun_fluid_cost = 500
	#How many ticks a portal remains open (200 = 10 seconds, -1 for infinite)
	#Range: > -1
	portal_gun_lifespan = 6000

#Portal Gun
[portal_gun_original]
	#How many ticks a portal remains open (-1 for infinite)
	#Range: > -1
	portal_gun_original_lifespan = 3000
	#Max FE capacity of the original Portal Gun
	#Range: > 1
	portal_gun_original_max_fe = 100000
	#FE cost per portal shot
	#Range: > 0
	portal_gun_original_fe_cost = 1000

#Polymorphic Wand V2
[polymorphic_wand_v2]
	#Maximum FE the Polymorphic Wand V2 can hold
	#Range: > 1
	polymorphic_wand_v2_max_fe = 200000
	#Maximum mB of polymorphic fluid the Polymorphic Wand V2 can hold
	#Range: > 1
	polymorphic_wand_v2_max_fluid = 32000
	#mB of polymorphic fluid consumed per random polymorph
	#Range: > 0
	random_polymorph_cost = 1000
	#mB of polymorphic fluid consumed per targeted polymorph
	#Range: > 0
	target_polymorph_cost = 1000
	#Entities the Polymorphic Wand cannot create, matched by regex against the full entity ID.
	#Each entry is a regex searched (not fully matched) against the entity ID, so partial matches work.
	#Example: "somebossmod:big_boss" blocks that exact entity,
	#or "^somebossmod:" blocks all entities from that mod.
	polymorph_blacklist = ["draconicevolution:draconic_guardian", "^pneumaticcraft:", "^avaritia:", "^twilightforest:", "^thermal:", "nuclearcraft:feral_ghoul_boss", "^mutantmonsters:", "^justdirethings:", "^cyclic:", "^cataclysm:", "^botania:", "born_in_chaos_v1:lord_pumpkinhead"]

#Goo settings
[goo]
	#If true, goo blocks have a chance to deactivate after each successful block conversion
	goo_can_die = true
	#The chance (0.0 to 1.0) that a goo block deactivates after each block conversion. Default is 0.1 (10%)
	#Range: 0.0 ~ 1.0
	goo_death_chance = 0.1
	#Restricts goo spreading for specific input blocks to only work in certain dimensions.
	#Each entry is a pair ["block_id", "dimension_id"].
	#A block listed here will ONLY be converted by goo while the goo is in the specified dimension.
	#Blocks not listed here are unrestricted and spread in any dimension.
	gooSpreadingSpecificDimensions = [["kubejs:infinity_10_block", "minecraft:overworld"], ["kubejs:infinity_10_1_block", "minecraft:the_nether"], ["kubejs:infinity_10_2_block", "minecraft:the_end"]]

#Block Swapper
[block_swapper]
	#Entities the Block Swapper cannot teleport, matched by regex against the full entity ID.
	#Each entry is a regex searched (not fully matched) against the entity ID, so partial matches work.
	#Example: "draconicevolution:chaos_guardian" blocks that exact entity,
	#or "^draconicevolution:" blocks all entities from that mod.
	swapper_entity_blacklist = ["draconicevolution"]
	#Blocks the Block Swapper cannot move, matched by regex against the full block ID.
	#Each entry is a regex searched (not fully matched) against the block ID, so partial matches work.
	#Example: "draconicevolution:chaos_crystal" blocks that exact block,
	#or "^draconicevolution:" blocks all blocks from that mod.
	#Note: the swapper_deny block tag also controls this and is checked first.
	swapper_block_blacklist = ["^draconicevolution:"]

#Cooldown Overlay Position
[overlay_position]
	#The X position of the cooldown overlay - this is pixels left from the center of the screen
	#Range: -500 ~ 500
	overlay_x_position = 91
	#The Y position of the cooldown overlay - this is pixels up from the bottom of the screen
	#Range: 0 ~ 500
	overlay_y_position = 70

#Tool Limits
[tools]
	#The maximum number of blocks that a Ferricore tool can break as a result of abilities, such as ore miner or tree feller.
	#Range: 1 ~ 2048
	tool_max_break_ferricore = 64
	#The maximum number of blocks that a Blazegold tool can break as a result of abilities, such as ore miner or tree feller.
	#Range: 1 ~ 2048
	tool_max_break_blazegold = 128
	#The maximum number of blocks that a Celestigem tool can break as a result of abilities, such as ore miner or tree feller.
	#Range: 1 ~ 2048
	tool_max_break_celestigem = 192
	#The maximum number of blocks that a Eclipse Alloy tool can break as a result of abilities, such as ore miner or tree feller.
	#Range: 1 ~ 2048
	tool_max_break_eclipsealloy = 256

#Player Accessor
[player_accessor]
	#Will you be blacklisting dimensions? If set to false, the Blacklist Dimensions list will not function.
	player_accessor_dimensional_blacklisting = false
	#The frequency with which the player accessor validates the player - the longer this is set to, the longer the player can be accessed in a blacklisted dimension.
	#Range: 0 ~ 5000
	player_accessor_validation_time = 100
	#A list of dimension names to blacklist for the Player Accessor feature.
	player_accessor_blacklisted_dimensions = []

